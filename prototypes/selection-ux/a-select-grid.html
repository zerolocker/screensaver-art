<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Option A — Select in the gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared.css" />
</head>
<body>
  <div class="page">
    <header>
      <a class="back" href="index.html">&larr; All options</a>
      <h1>Option A — Select in the gallery</h1>
      <p class="sub">
        The gallery grid itself is the picker. Click a card to toggle it; shift-click selects a
        range. Dimmed pieces won't play. Changes are staged until you hit Save.
      </p>
    </header>

    <div class="toolbar">
      <span class="chip" id="count"></span>
      <input type="search" id="search" placeholder="Search artworks…" />
      <span class="spacer"></span>
      <button class="btn" id="selectAll">Select all</button>
      <button class="btn" id="selectNone">Deselect all</button>
      <button class="btn ghost" id="reset">Reset to default (first 100)</button>
    </div>

    <div class="grid" id="grid"></div>
  </div>

  <div class="savebar" id="savebar">
    <span class="msg" id="savemsg"></span>
    <button class="btn" id="discard">Discard</button>
    <button class="btn primary" id="save">Save</button>
  </div>

  <script src="shared.js"></script>
  <script>
    const KEY = 'lart-proto-a'
    const grid = document.getElementById('grid')
    const countEl = document.getElementById('count')
    const savebar = document.getElementById('savebar')
    const savemsg = document.getElementById('savemsg')
    const saveBtn = document.getElementById('save')

    let items = []
    const cards = new Map()
    let selected = new Set()
    let savedSnapshot = '[]'
    let anchorId = null // last clicked card, for shift-click ranges

    init()

    async function init() {
      items = await loadGallery()
      const stored = loadState(KEY, null)
      selected = new Set(stored ?? defaultIds(items))
      savedSnapshot = snapshot()

      for (const item of items) {
        const card = document.createElement('div')
        card.className = 'card'
        card.dataset.id = item.id
        const video = makeVideo(item)
        hoverPlay(card, video)
        const title = document.createElement('div')
        title.className = 'title'
        title.textContent = item.title
        const check = document.createElement('div')
        check.className = 'check'
        check.innerHTML = ICONS.check
        card.append(video, title, check)
        card.addEventListener('click', (e) => toggle(item.id, e.shiftKey))
        grid.appendChild(card)
        cards.set(item.id, card)
      }

      document.getElementById('search').addEventListener('input', (e) => filter(e.target.value))
      document.getElementById('selectAll').addEventListener('click', () => bulk(true))
      document.getElementById('selectNone').addEventListener('click', () => bulk(false))
      document.getElementById('reset').addEventListener('click', () => {
        selected = new Set(defaultIds(items))
        update()
      })
      document.getElementById('discard').addEventListener('click', () => {
        selected = new Set(JSON.parse(savedSnapshot))
        update()
      })
      saveBtn.addEventListener('click', () => {
        savedSnapshot = snapshot()
        saveState(KEY, [...selected])
        update()
        toast(`Saved — your screensaver will play ${selected.size} pieces`)
      })

      update()
    }

    function snapshot() {
      return JSON.stringify([...selected].sort((a, b) => a - b))
    }

    function visibleIds() {
      return [...grid.children]
        .filter((c) => c.style.display !== 'none')
        .map((c) => Number(c.dataset.id))
    }

    function toggle(id, shift) {
      if (shift && anchorId !== null) {
        const ids = visibleIds()
        const a = ids.indexOf(anchorId)
        const b = ids.indexOf(id)
        if (a !== -1 && b !== -1) {
          const turnOn = !selected.has(id)
          const [lo, hi] = a < b ? [a, b] : [b, a]
          for (let i = lo; i <= hi; i++) turnOn ? selected.add(ids[i]) : selected.delete(ids[i])
          anchorId = id
          update()
          return
        }
      }
      selected.has(id) ? selected.delete(id) : selected.add(id)
      anchorId = id
      update()
    }

    function bulk(on) {
      for (const id of visibleIds()) on ? selected.add(id) : selected.delete(id)
      update()
    }

    function filter(q) {
      const needle = q.trim().toLowerCase()
      for (const item of items) {
        const match = !needle || item.title.toLowerCase().includes(needle)
        cards.get(item.id).style.display = match ? '' : 'none'
      }
    }

    function update() {
      for (const item of items) {
        const card = cards.get(item.id)
        const on = selected.has(item.id)
        card.classList.toggle('on', on)
        card.classList.toggle('off', !on)
      }
      countEl.innerHTML = `<b>${selected.size}</b> of ${items.length} selected · ${estSize(selected.size)}`
      const dirty = snapshot() !== savedSnapshot
      savebar.classList.toggle('show', dirty)
      saveBtn.disabled = selected.size === 0
      savemsg.textContent = selected.size === 0 ? 'Select at least one piece' : 'Unsaved changes'
    }
  </script>
</body>
</html>
