name: Secret rotation reminder

# Opens (or refreshes) a GitHub issue when an Auth/OAuth secret nears its
# rotation due date. Dates live in .github/secret-rotation.json (the single
# source of truth); due = last_rotated + interval_months.
#
# NOTE: scheduled workflows only run from the DEFAULT branch (master), so this
# starts firing once merged to master. Use the "Run workflow" button
# (workflow_dispatch) with dry_run=true to preview at any time.

on:
  schedule:
    - cron: '0 14 * * 1' # every Monday 14:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Log what would happen without creating/updating issues'
        type: boolean
        default: false

permissions:
  issues: write
  contents: read

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/github-script@v7
        env:
          DRY_RUN: ${{ inputs.dry_run }}
        with:
          script: |
            const fs = require('fs')
            const dryRun = process.env.DRY_RUN === 'true'
            const cfg = JSON.parse(fs.readFileSync('.github/secret-rotation.json', 'utf8'))
            const { owner, repo } = context.repo
            const today = new Date()

            const addMonths = (iso, months) => {
              const d = new Date(iso + 'T00:00:00Z')
              d.setUTCMonth(d.getUTCMonth() + months)
              return d
            }
            const daysBetween = (a, b) => Math.floor((a - b) / 86400000)
            const runbook = `https://github.com/${owner}/${repo}/blob/HEAD/docs/secret-rotation.md`

            // Fetch all open rotation issues once (label is auto-created on first use).
            const open = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: 'open', labels: 'secret-rotation', per_page: 100,
            })

            for (const s of cfg.secrets) {
              const due = addMonths(s.last_rotated, s.interval_months)
              const dueStr = due.toISOString().slice(0, 10)
              const daysUntil = daysBetween(due, today)
              const marker = `<!-- secret-rotation:${s.id} -->`
              const existing = open.find((i) => (i.body || '').includes(marker))

              if (daysUntil > s.lead_days) {
                core.info(`${s.id}: due ${dueStr} (${daysUntil}d) — outside ${s.lead_days}d window, skip.`)
                continue
              }

              const overdue = daysUntil < 0
              const title = `🔑 Rotate ${s.name} — due ${dueStr}${overdue ? ' (OVERDUE)' : ''}`
              const body = [
                marker,
                `**${s.name}** is due for rotation on **${dueStr}** ` +
                  (overdue ? `(**${-daysUntil} days overdue**).` : `(in **${daysUntil} days**).`),
                ``,
                `- **Where:** ${s.where}`,
                `- **Cadence:** every ${s.interval_months} months (last rotated ${s.last_rotated})`,
                `- **Provider docs:** ${s.docs}`,
                `- **Runbook:** ${runbook}`,
                ``,
                `### After you rotate`,
                `1. Update the secret in the Supabase dashboard (see runbook).`,
                `2. Bump \`last_rotated\` for \`${s.id}\` in \`.github/secret-rotation.json\` to today's date (and the table in \`docs/secret-rotation.md\`).`,
                `3. Close this issue — the reminder resets to the next cycle automatically.`,
              ].join('\n')

              if (dryRun) {
                core.info(`[dry-run] would ${existing ? 'update #' + existing.number : 'create'}: ${title}`)
                continue
              }

              if (existing) {
                if (existing.title !== title || !(existing.body || '').includes(dueStr)) {
                  await github.rest.issues.update({ owner, repo, issue_number: existing.number, title, body })
                  core.info(`Updated #${existing.number}: ${title}`)
                } else {
                  core.info(`Already current: #${existing.number} ${title}`)
                }
              } else {
                const { data } = await github.rest.issues.create({ owner, repo, title, body, labels: ['secret-rotation'] })
                core.info(`Created #${data.number}: ${title}`)
              }
            }
